<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web Battle Game</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="app">
    <aside class="panel" aria-label="Game controls and character information">
      <header class="panel-header">
        <h1>Web Battle Game</h1>
        <div class="toolbar">
          <button id="pause-button" type="button" aria-pressed="false" aria-label="Pause game" hidden>Pause</button>
          <button id="mute-button" type="button" aria-pressed="false" aria-label="Mute sound effects" hidden>Mute</button>
          <button id="stop-button" type="button" aria-label="Stop current game" hidden>Stop</button>
        </div>
      </header>
      <p class="intro">Choose two fighters and an arena map.</p>

      <div id="start-menu" class="menu" role="region" aria-label="Game setup"></div>
    </aside>

    <section class="stage" aria-label="Battle arena">
      <canvas id="game-canvas" width="900" height="600">
        Your browser does not support HTML5 Canvas.
      </canvas>
      <div id="match-status" class="match-status"></div>
      <div id="character-list" class="arena-character-list"></div>
    </section>
  </main>

  <script type="module" src="./dist/main.js"></script>
</body>
</html>
